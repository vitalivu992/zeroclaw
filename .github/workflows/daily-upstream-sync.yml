name: Daily Upstream Sync

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/zeroclaw-labs/zeroclaw.git || true
          git fetch upstream main

      - name: Check for new commits
        id: check-commits
        run: |
          LOCAL=$(git rev-parse HEAD)
          UPSTREAM=$(git rev-parse upstream/main)

          if [ "$LOCAL" = "$UPSTREAM" ]; then
            echo "No new commits from upstream"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            COMMIT_COUNT=$(git rev-list --count HEAD..upstream/main)
            echo "Found $COMMIT_COUNT new commits from upstream"
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "commit_count=$COMMIT_COUNT" >> $GITHUB_OUTPUT
          fi

      - name: Create sync branch
        if: steps.check-commits.outputs.has_changes == 'true'
        run: |
          BRANCH_NAME="sync/upstream-$(date +%Y%m%d)"
          git checkout -b $BRANCH_NAME
          git merge upstream/main --no-edit

      - name: Push sync branch
        if: steps.check-commits.outputs.has_changes == 'true'
        run: |
          BRANCH_NAME="sync/upstream-$(date +%Y%m%d)"
          git push origin $BRANCH_NAME --force

      - name: Create Pull Request
        if: steps.check-commits.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH_NAME="sync/upstream-$(date +%Y%m%d)"
          COMMIT_COUNT=${{ steps.check-commits.outputs.commit_count }}

          # Check if PR already exists
          EXISTING_PR=$(gh pr list --head $BRANCH_NAME --state open --json number --jq '.[0].number' 2>/dev/null || echo "")

          if [ -z "$EXISTING_PR" ]; then
            gh pr create \
              --title "chore: sync upstream changes ($COMMIT_COUNT commits)" \
              --body "$(cat <<'EOF'
          ## Summary
          Automated sync of upstream changes from `zeroclaw-labs/zeroclaw:main`.

          **Commits synced:** $COMMIT_COUNT

          ## Changes
          This PR contains the latest upstream changes. Please review before merging.

          ## Test plan
          - [ ] Review the diff for any conflicts or unexpected changes
          - [ ] Verify CI passes
          - [ ] Merge if all checks pass

          ---

          🤖 Generated by [Daily Upstream Sync](https://github.com/${{ github.repository }}/actions/workflows/daily-upstream-sync.yml)
          EOF
          )" \
              --base main
          else
            echo "PR #$EXISTING_PR already exists for this branch"
          fi
